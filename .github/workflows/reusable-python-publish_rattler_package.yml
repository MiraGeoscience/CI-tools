name: Publish Rattler package to Artifactory

on:
  workflow_call:
    inputs:
        package-name:
            description: Name of the package to build
            required: true
            type: string
        python-version:
            description: Python version to use (e.g. 3.10)
            required: true
            type: string
        conda-channels:
            description: 'List of conda channels to pull from (e.g. ["conda-forge", "pytorch"])'
            required: true
            type: string
        source-repo-names:
            description: 'List of repository names to pull from (e.g. ["geology-conda-dev", "geophysics-conda-dev"])'
            required: false
            type: string
            default: '[]'
        publish-repo-names:
            description: 'List of repository names to publish to (e.g. ["public-conda-dev", "geophysics-conda-dev"])'
            required: true
            type: string
        os:
            description: OS to build against (e.g. "ubuntu-latest")
            required: false
            type: string
            default: ubuntu-latest
        lfs:
            description: Boolean to indicate if GitHub LFS is needed
            required: false
            type: boolean
            default: true
        timeout-minutes:
            description: Timeout in minutes for the job
            required: false
            type: number
            default: 20
        source-path:
            description: |
                Path to the package folder (typically with pyproject.toml or setup.py).
                Defaults to the root of the repository.
            required: false
            type: string
            default: '.'
        recipe-path:
            description: Path to the recipe file. Defaults to looking for a recipe.yaml in the source-path.
            required: false
            type: string
            default: ''
        version-tag:
            description: Version tag of the package to build (defaults to github.ref_name if not provided)
            required: false
            type: string
        build-experimental:
            description: Enable rattler-build experimental features
            required: false
            type: boolean
            default: false
    secrets:
        JFROG_ARTIFACTORY_URL:
            description: JFrog Artifactory URL
            required: true
        JFROG_ARTIFACTORY_TOKEN:
            description: JFrog Artifactory Token
            required: true

permissions:
    contents: read

defaults:
    run:
        shell: 'bash -l {0}'

jobs:
    build_rattler_package:
        name: Build package with rattler
        if: ${{ github.repository_owner == 'MiraGeoscience' }}
        runs-on: ubuntu-latest
        timeout-minutes: ${{ inputs.timeout-minutes }}
        env:
            CONDA_CHANNEL_ALIAS: https://repo.prefix.dev
            MAMBA_CHANNEL_ALIAS: https://repo.prefix.dev # cover for both conda and mamba
            SOURCE_PATH: ${{ inputs.source-path || '.' }}
            RECIPE_PATH: ${{ inputs.recipe-path || format('{0}/{1}', inputs.source-path || '.', 'recipe.yaml') }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    lfs: ${{ inputs.lfs }}
                    fetch-depth: 0
                    persist-credentials: false
            -   name: Set up Python version
                uses: actions/setup-python@v6.2.0
                with:
                    python-version: ${{ inputs.python-version }}
            -   name: Generate package version
                run: pip install --dry-run --no-deps "${SOURCE_PATH}"
            -   name: Check if there is a rattler recipe
                run: |
                    if [ -f "${RECIPE_PATH}" ]; then
                        echo "::notice::Rattler recipe found"
                    else
                        echo "::error::Rattler recipe not found"
                        exit 1
                    fi
            -   name: Configure channels and Auth
                id: config-channels
                env:
                  INPUTS_SOURCE_REPO_NAMES: ${{ inputs.source-repo-names }}
                  INPUTS_CONDA_CHANNELS: ${{ inputs.conda-channels }}
                run: |
                    repository_list=$(echo "${INPUTS_SOURCE_REPO_NAMES}" | jq -r '.[]' | xargs)
                    if [ -n "$repository_list" ]; then
                        RATTLER_AUTH_FILE=${{ runner.temp }}/credentials.json
                        echo '{"${{ secrets.JFROG_ARTIFACTORY_URL }}": {"BasicHTTP": {"username": "github", "password":"${{ secrets.JFROG_ARTIFACTORY_TOKEN }}"} } }' > "$RATTLER_AUTH_FILE"
                        echo "RATTLER_AUTH_FILE=${RATTLER_AUTH_FILE}" >> "$GITHUB_ENV"
                    fi

                    # Loop through the repository names and add them to the command
                    BUILD_ARGS=""
                    for repo_name in ${repository_list}; do
                        BUILD_ARGS+=" --channel https://${{ secrets.JFROG_ARTIFACTORY_URL }}/artifactory/api/conda/${repo_name}"
                    done

                    channel_list=$(echo "${INPUTS_CONDA_CHANNELS}" | jq -r '.[]' | xargs)
                    for channel_name in ${channel_list}; do
                        BUILD_ARGS+=" --channel ${channel_name}"
                    done

                    echo "BUILD_ARGS=$BUILD_ARGS" >> "$GITHUB_OUTPUT"
            -   name: Build package
                uses: prefix-dev/rattler-build-action@v0.2.38
                with:
                    upload-artifact: false  # upload happens at the next step with more options
                    build-args: >-
                        --output-dir ${{ runner.temp }}/output
                        --channel-priority strict
                        ${{ steps.config-channels.outputs.BUILD_ARGS }}
                    recipe-path: ${{ env.RECIPE_PATH }}
                env:
                    RATTLER_AUTH_FILE: ${{ runner.temp }}/credentials.json
                    RATTLER_BUILD_EXPERIMENTAL: ${{ inputs.build-experimental && 'true' || 'false' }}
            -   name: Archive build artifact
                uses: actions/upload-artifact@v7
                with:
                    name: ${{ inputs.package-name }}-conda-package-build
                    path: ${{ runner.temp }}/output/**/*.conda
                    retention-days: 7

    is_publishable:
        name: Check version publishability
        uses: MiraGeoscience/CI-tools/.github/workflows/reusable-version-check.yml@v3
        with:
          version-tag: ${{ inputs.version-tag || github.ref_name }}

    publish_package:
        name: Publish package
        needs: [build_rattler_package, is_publishable]
        if: ${{ github.repository_owner == 'MiraGeoscience' && needs.is_publishable.outputs.is-publishable == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        strategy:
            matrix:
                publish-repo-name: ${{ fromJson(inputs.publish-repo-names) }}
        steps:
            -   name: Download build artifact
                uses: actions/download-artifact@v8
                with:
                    name: ${{ inputs.package-name }}-conda-package-build
                    path: build-dir
            -   name: Publish package to Artifactory
                uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-publish_to_artifactory@v3
                with:
                    build-dir-path: build-dir/noarch
                    artifactory-dir-path: ${{ matrix.publish-repo-name}}/noarch
                    JFROG_ARTIFACTORY_URL: ${{ secrets.JFROG_ARTIFACTORY_URL }}
                    JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

    add_release_asset:
        name: Add release asset
        needs: publish_package
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            -   name: Get draft release
                uses: MiraGeoscience/CI-tools/.github/actions/reusable-get_draft_release@v3
                id: get-draft-release
                with:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            -   name: Download build artifact
                uses: actions/download-artifact@v8
                with:
                    name: ${{ inputs.package-name }}-conda-package-build
                    path: download-artifact
            -   name: Upload release asset
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    GH_REPO: ${{ github.repository }}
                run: gh release upload --clobber ${{ steps.get-draft-release.outputs.release-tag }} download-artifact/**/*
