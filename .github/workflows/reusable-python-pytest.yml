name: Pytest on any OS

on:
  workflow_call:
    inputs:
      package-manager:
        description: Package manager to use (e.g. "conda", "poetry", "pixi")
        required: true
        type: string
        default: poetry
      python-versions:
        description: 'List of Python versions to test against (e.g. ["3.10", "3.11", "3.12"])'
        required: false
        type: string
        default: "['3.10']"
      os:
        description: 'List of OS to test against (e.g. ["ubuntu-latest", "macos-latest"])'
        required: false
        type: string
        default: "['ubuntu-latest']"
      test-cmd:
        description: >
          Test command to run, if different from pytest with coverage.
          Applies to conda, poetry, and hatch only. Use pixi-task for pixi.
        required: false
        type: string
        default: "pytest --cov --cov-report=xml"
      cache-number:
        description: Cache number to reset cache if poetry.lock has not changed
        required: false
        type: number
        default: 1
      codecov-reference-python-version:
        description: >
          Python version to use as reference for Codecov. When using pixi-environments,
          set this to the pixi environment name that should upload coverage.
        required: false
        type: string
      codecov-reference-os:
        description: List of OS to use as reference for Codecov
        required: false
        type: string
        default: "['windows-latest']"
      install-extras:
        description: 'Extra dependencies for pip to install (e.g. ["torch", "cuda"])'
        required: false
        type: string
      conda-channels:
        description: 'List of conda channels to pull from (e.g. ["conda-forge", "pytorch"])'
        required: false
        type: string
      virtual-repo-names:
        description: >
          List of repository names to resolve on for pip or Conda
          (e.g. ["public-pypi-dev"], or ["public-conda-dev"])
        required: false
        type: string
      pixi-environments:
        description: >
          JSON list of Pixi environment names to install (e.g. '["test-engine", "test-evals"]').
          When provided, drives the matrix instead of python-versions.
        required: false
        type: string
      pixi-task:
        description: >
          Pixi task name to run tests (e.g. 'test-engine'). Must match a task
          defined in pixi.toml. Validated against available tasks before execution.
        required: false
        type: string
      pixi-task-args:
        description: >
          JSON list of extra arguments to pass to the pixi task after '--'
          (e.g. '["-k", "test_interpolation"]'). Optional.
        required: false
        type: string
      lfs:
        description: Boolean to indicate if GitHub LFS is needed
        required: false
        type: boolean
        default: false
      timeout-minutes:
        description: Timeout in minutes for the job
        required: false
        type: number
        default: 20

    secrets:
      CODECOV_TOKEN:
        description: Codecov token
        required: false
      JFROG_ARTIFACTORY_URL:
        description: JFrog Artifactory URL, needed if packages are on Artifactory
        required: false
      JFROG_ARTIFACTORY_TOKEN:
        description: JFrog Artifactory Token, needed if packages are on Artifactory
        required: false

jobs:
  pytest:
    name: Pytest
    if: ${{ (github.event_name != 'pull_request') || (github.event.pull_request.draft == false) }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON((inputs.package-manager == 'pixi' && inputs.pixi-environments) || inputs.python-versions) }}
        os: ${{ fromJson(inputs.os)}}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: 'bash -l {0}'
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python version
        uses: actions/setup-python@v6
        if: ${{ inputs.package-manager == 'poetry' || inputs.package-manager == 'hatch' }}
        with:
          python-version: ${{ matrix.python-version }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_conda@v2
        name: Setup conda env
        if: ${{ inputs.package-manager == 'conda' }}
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        with:
          cache-number: ${{ inputs.cache-number }}
          python-version: ${{ matrix.python-version }}
          virtual-repo-names: ${{ inputs.virtual-repo-names }}
          JFROG_ARTIFACTORY_URL: ${{ secrets.JFROG_ARTIFACTORY_URL }}
          JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_poetry@v2
        name: Setup poetry env
        if: ${{ inputs.package-manager == 'poetry' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          runner-os: ${{ runner.os }}
          install-extras: ${{ inputs.install-extras }}
          virtual-repo-names: ${{ inputs.virtual-repo-names }}
          JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_hatch@v2
        name: Setup hatch env
        if: ${{ inputs.package-manager == 'hatch' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          runner-os: ${{ runner.os }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_pixi@v3.4.0-alpha.1
        name: Setup pixi env
        if: ${{ inputs.package-manager == 'pixi' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          python-version: ${{ inputs.pixi-environments && '' || matrix.python-version }}
          environment-name: ${{ inputs.pixi-environments && matrix.python-version || '' }}
          JFROG_ARTIFACTORY_URL: ${{ secrets.JFROG_ARTIFACTORY_URL }}
          JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

      - name: Validate pixi task
        if: ${{ inputs.package-manager == 'pixi' }}
        env:
          PIXI_TASK: ${{ inputs.pixi-task }}
        run: |
          if ! pixi task list | tr ',' '\n' | tr -d ' \r' | grep -qFx "$PIXI_TASK"; then
            echo "::error::Pixi task '$PIXI_TASK' is not defined in pixi.toml."
            exit 1
          fi

      - name: Run Pytest
        env:
          TEST_CMD: ${{ inputs.test-cmd || 'pytest --cov --cov-report=xml' }}
          PIXI_TASK: ${{ inputs.pixi-task }}
          PIXI_TASK_ARGS: ${{ inputs.pixi-task-args }}
        run: |
          if ${{ inputs.package-manager == 'conda' }}; then
            $TEST_CMD
          elif ${{ inputs.package-manager == 'poetry' }}; then
            poetry run $TEST_CMD
          elif ${{ inputs.package-manager == 'pixi' }}; then
            if [ -n "$PIXI_TASK_ARGS" ]; then
              readarray -t args < <(echo "$PIXI_TASK_ARGS" | python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)))")
              pixi run "$PIXI_TASK" -- "${args[@]}"
            else
              pixi run "$PIXI_TASK"
            fi
          else
            hatch run $TEST_CMD
          fi

      - name: Codecov
        if:  ${{ (inputs.codecov-reference-python-version) && (matrix.python-version == inputs.codecov-reference-python-version) && contains(inputs.codecov-reference-os, matrix.os) }}
        uses: codecov/codecov-action@v6
        with:
          name: GitHub
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
