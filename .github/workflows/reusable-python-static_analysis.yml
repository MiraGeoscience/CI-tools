name: Static analysis

on:
  workflow_call:
    inputs:
      package-manager:
        description: Package manager to use (e.g. "conda", "poetry", "pixi")
        required: true
        type: string
        default: poetry
      app-name:
        description: Name of the app to run static analysis on
        required: true
        type: string
      python-version:
        description: Python version used with pylint
        required: false
        type: string
        default: '3.10'
      install-extras:
        description: 'Extra dependencies for pip to install (e.g. ["torch", "cuda"])'
        required: false
        type: string
      virtual-repo-names:
        description: >
          List of repository names to resolve on for pip or Conda
          (e.g. ["public-pypi-dev"], or ["public-conda-dev"])
        required: false
        type: string
      pixi-environment:
        description: >
          Pixi environment name to install (e.g. 'test-engine'). When provided,
          takes precedence over the name derived from python-version (py<version-without-dots>).
        required: false
        type: string
      pixi-task:
        description: >
          Pixi task name to run linting (e.g. 'lint-engine'). Must match a task
          defined in pixi.toml. Validated against available tasks before execution.
          Only applies to the pixi package manager; conda/poetry/hatch use pylint directly.
        required: false
        type: string
      pixi-task-args:
        description: >
          JSON list of extra arguments to pass to the pixi task after '--'
          (e.g. '["-v"]'). Optional.
        required: false
        type: string
      lfs:
        description: Boolean to indicate if GitHub LFS is needed
        required: false
        type: boolean
        default: false
      timeout-minutes:
        description: Timeout in minutes for the job
        required: false
        type: number
        default: 20
      os:
        description: 'List of OS to test against (e.g. ["ubuntu-latest", "macos-latest"])'
        required: false
        type: string
        default: "['ubuntu-latest']"
      cache-number:
        description: Cache number to reset cache if poetry.lock has not changed
        required: false
        type: number
        default: 1
    secrets:
      JFROG_ARTIFACTORY_URL:
        description: JFrog Artifactory URL, needed if packages are on Artifactory
        required: false
      JFROG_ARTIFACTORY_TOKEN:
        description: JFrog Artifactory Token, needed if packages are on Artifactory
        required: false

env:
  source_dir: ${{ inputs.app-name }}

jobs:
  pylint:
    name: pylint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: 'bash -l {0}'
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
          fetch-depth: 0
          persist-credentials: true

      - name: Capture modified files
        if: github.event_name == 'pull_request'
        run: >-
          git fetch --deepen=500 origin ${GITHUB_BASE_REF}
          && echo "FILES_PARAM=$(
          git diff --diff-filter=AM --name-only refs/remotes/origin/${GITHUB_BASE_REF}... -- | grep -E "^(${source_dir}|tests)/.*\.py$" | xargs
          )" >> $GITHUB_ENV

      - name: Remove git credentials
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || [ $? -eq 5 ]
          git config --local --unset-all include.path || [ $? -eq 5 ]

      - name: Set up Python version
        uses: actions/setup-python@v6
        if: ${{ inputs.package-manager == 'poetry' || inputs.package-manager == 'hatch' }}
        with:
          python-version: ${{inputs.python-version}}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_conda@v3
        name: Setup conda env
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        if: ${{ inputs.package-manager == 'conda' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          python-version: ${{ inputs.python-version }}
          virtual-repo-names: ${{ inputs.virtual-repo-names }}
          JFROG_ARTIFACTORY_URL: ${{ secrets.JFROG_ARTIFACTORY_URL }}
          JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_poetry@v3
        name: Setup poetry env
        if: ${{ inputs.package-manager == 'poetry' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          runner-os: ${{ runner.os }}
          install-extras: ${{ inputs.install-extras }}
          virtual-repo-names: ${{ inputs.virtual-repo-names }}
          JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_hatch@v3
        name: Setup hatch env
        if: ${{ inputs.package-manager == 'hatch' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          runner-os: ${{ runner.os }}

      - uses: MiraGeoscience/CI-tools/.github/actions/reusable-python-setup_pixi@v3.4.0
        name: Setup pixi env
        if: ${{ inputs.package-manager == 'pixi' }}
        with:
          cache-number: ${{ inputs.cache-number }}
          python-version: ${{ inputs.python-version }}
          environment-name: ${{ inputs.pixi-environment }}
          JFROG_ARTIFACTORY_URL: ${{ secrets.JFROG_ARTIFACTORY_URL }}
          JFROG_ARTIFACTORY_TOKEN: ${{ secrets.JFROG_ARTIFACTORY_TOKEN }}

      - name: Validate pixi task
        if: ${{ inputs.package-manager == 'pixi' && inputs.pixi-task }}
        env:
          PIXI_TASK: ${{ inputs.pixi-task }}
        run: |
          if ! pixi task list --json | python -c "import json, sys; target = sys.argv[1]; data = json.load(sys.stdin); has_task = lambda node: (isinstance(node, dict) and ((node.get('name') == target and any(key in node for key in ('cmd', 'depends_on', 'cwd', 'clean_env'))) or any(has_task(value) for value in node.values()))) or (isinstance(node, list) and any(has_task(item) for item in node)); sys.exit(0 if has_task(data) else 1)" "$PIXI_TASK"; then
            echo "::error::Pixi task '$PIXI_TASK' is not defined in pixi.toml."
            exit 1
          fi

      - name: Run Pylint on modified files
        if: ${{ (github.event_name == 'pull_request') && env.FILES_PARAM }}
        env:
          PIXI_TASK: ${{ inputs.pixi-task }}
          PIXI_TASK_ARGS: ${{ inputs.pixi-task-args }}
        run: |
          if ${{ inputs.package-manager == 'conda' }}; then
            pylint $FILES_PARAM
          elif ${{ inputs.package-manager == 'poetry' }}; then
            poetry run pylint $FILES_PARAM
          elif ${{ inputs.package-manager == 'pixi' }}; then
            read -r -a files <<< "$FILES_PARAM"
            if [ -n "$PIXI_TASK" ]; then
              if [ -n "$PIXI_TASK_ARGS" ]; then
                args_output=$(printf '%s' "$PIXI_TASK_ARGS" | python -c "import json, sys; data = json.load(sys.stdin); assert isinstance(data, list) and all(isinstance(x, str) for x in data), 'pixi-task-args must be a JSON array of strings'; print('\n'.join(data))") || { echo "::error::Invalid pixi-task-args. Must be a JSON array of strings."; exit 1; }
                readarray -t args <<< "$args_output"
                pixi run "$PIXI_TASK" -- "${args[@]}" "${files[@]}"
              else
                pixi run "$PIXI_TASK" -- "${files[@]}"
              fi
            else
              pixi run pylint "${files[@]}"
            fi
          else
            hatch run pylint $FILES_PARAM
          fi

      - name: Run Pylint on all files
        if: ${{ github.event_name != 'pull_request' || !env.FILES_PARAM }}
        env:
          PIXI_TASK: ${{ inputs.pixi-task }}
          PIXI_TASK_ARGS: ${{ inputs.pixi-task-args }}
        run: |
          if ${{ inputs.package-manager == 'conda' }}; then
            pylint --verbose $source_dir tests
          elif ${{ inputs.package-manager == 'poetry' }}; then
            poetry run pylint --verbose $source_dir tests
          elif ${{ inputs.package-manager == 'pixi' }}; then
            if [ -n "$PIXI_TASK" ]; then
              if [ -n "$PIXI_TASK_ARGS" ]; then
                args_output=$(printf '%s' "$PIXI_TASK_ARGS" | python -c "import json, sys; data = json.load(sys.stdin); assert isinstance(data, list) and all(isinstance(x, str) for x in data), 'pixi-task-args must be a JSON array of strings'; print('\n'.join(data))") || { echo "::error::Invalid pixi-task-args. Must be a JSON array of strings."; exit 1; }
                readarray -t args <<< "$args_output"
                pixi run "$PIXI_TASK" -- "${args[@]}"
              else
                pixi run "$PIXI_TASK"
              fi
            else
              pixi run pylint --verbose $source_dir tests
            fi
          else
            hatch run pylint --verbose $source_dir tests
          fi
